name: Core Type Checking

on: [push, pull_request]

jobs:
  type-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install uv
      run: pip install uv

    - name: Sync locked dependencies
      run: uv sync --frozen --all-extras --all-groups

    - name: Run mypy for hardened core modules
      run: >-
        uv run --frozen mypy
        src/app/core
        src/app/event
        src/app/modules/auth_refresh_session
        src/app/modules/event_outbox
        src/app/modules/admin/role
        src/app/modules/assets
        --config-file pyproject.toml
      env:
        ENVIRONMENT: local
        SECRET_KEY: test-secret-key-for-testing-only
